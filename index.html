/* ================= plan normalize / validate ================= */
function num(v, f) { if (v == null || isNaN(+v)) throw new Error(`Missing or invalid "${f}".`); return +v; }
function normalizePlan(raw) {
  if (!raw || typeof raw !== "object") throw new Error("Not a plan object.");
  const weekStart = raw.weekStart || raw.weekKey;
  if (!weekStart || !/^\d{4}-\d{2}-\d{2}$/.test(weekStart)) throw new Error('Need "weekStart" as YYYY-MM-DD.');
  const t = raw.targets || {};
  const target = { kcal: num(t.kcal ?? t.calories, "targets.kcal"), p: num(t.protein ?? t.p, "targets.protein"),
    c: num(t.carbs ?? t.c, "targets.carbs"), f: num(t.fat ?? t.f, "targets.fat") };
  if (!Array.isArray(raw.days) || raw.days.length < 1) throw new Error('"days" must be a non-empty array.');
  const base = new Date(weekStart + "T00:00:00");
  const NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const days = raw.days.map((d, i) => {
    const dt = new Date(base.getTime() + i * 86400000);
    if (!Array.isArray(d.meals) || !d.meals.length) throw new Error(`Day ${i + 1} has no meals.`);
    return {
      day: d.day || NAMES[dt.getDay()],
      date: d.date || dt.toLocaleDateString("en-US", { month: "short", day: "numeric" }),
      meals: d.meals.map((m, j) => ({
        id: `${i}-${j}`, slot: m.slot || "Meal", name: m.name || "—", note: m.note || "",
        kcal: +m.kcal || 0, p: +(m.protein ?? m.p) || 0, c: +(m.carbs ?? m.c) || 0, f: +(m.fat ?? m.f) || 0, na: +(m.na ?? m.sodium) || 0,
        out: (m.tags || []).includes("out") || !!m.out, cook: (m.tags || []).includes("cook") || !!m.cook,
      })),
    };
  });
  const grocery = (raw.grocery || []).map((g, gi) => ({
    section: g.section || "Other",
    items: (g.items || []).map((it, ii) => ({ id: `${gi}-${ii}`, name: it.name || "—", qty: it.qty || "" })) }));
  return { weekKey: weekStart, weekLabel: raw.weekLabel || "Week of " + base.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }),
    target, days, grocery, notes: raw.notes || "",
    recipes: (raw.recipes || []).map((r) => ({ name: r.name || "—", desc: r.desc || "", prep: r.prep || "",
      servings: +r.servings || 4, covers: r.covers || "", perServing: r.perServing || {} })) };
}

const store = {
  async get(k) { try { const v = localStorage.getItem(k); return v == null ? null : JSON.parse(v); } catch (e) { return null; } },
  async set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} },
};
const IDX = "weeks-index", ACTIVE = "active-week", TASTE = "taste-feedback", KEY_STORE = "anthropic-key", CHECKINS = "checkin-history";
const normName = (s) => (s || "").toLowerCase().replace(/[^a-z0-9 ]/g, "").replace(/\s+/g, " ").trim();

function todayIndex(weekKey, len) {
  const start = new Date(weekKey + "T00:00:00");
  return Math.max(0, Math.min((len || 7) - 1, Math.floor((Date.now() - start) / 86400000)));
}
function nextSunday() {
  const d = new Date(); d.setHours(0, 0, 0, 0);
  const add = (7 - d.getDay()) % 7 || 7;
  d.setDate(d.getDate() + add);
  return d.toISOString().slice(0, 10);
}

/* ================= Claude API (bring-your-own-key, direct browser access) ================= */
async function askClaude(system, user, maxTokens) {
  const apiKey = (await store.get(KEY_STORE)) || "";
  if (!apiKey) throw new Error("No API key connected. Open the AI generator panel on the Plan tab and paste your Anthropic key — or generate the plan in a Claude chat and load the JSON via Weeks → Import.");

  function drainLine(line, state) {
    var s = line.trim();
    if (s.indexOf("data:") !== 0) return;
    var payload = s.slice(5).trim();
    if (!payload || payload === "[DONE]") return;
    try {
      var ev = JSON.parse(payload);
      if (ev && ev.type === "content_block_delta" && ev.delta && typeof ev.delta.text === "string") state.out += ev.delta.text;
      else if (ev && ev.type === "error") state.err = (ev.error && ev.error.message) || "stream error";
      else if (ev && ev.delta && typeof ev.delta.text === "string") state.out += ev.delta.text; // permissive fallback
    } catch (_) {}
  }

  for (let attempt = 0; attempt < 2; attempt++) {
    const controller = new AbortController();
    const timer = setTimeout(function () { controller.abort(); }, 75000);
    let resp;
    try {
      resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        signal: controller.signal,
        headers: {
          "content-type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-5",
          max_tokens: maxTokens || 4000,
          stream: true,
          messages: [{ role: "user", content: system + "\n\n=== TASK ===\n" + user }],
        }),
      });
    } catch (e) {
      clearTimeout(timer);
      if (attempt < 2) continue;
      throw new Error("Couldn't reach the Anthropic API from the browser. The request may be timing out — try again, or generate in a Claude chat and load the JSON via Weeks → Import.");
    }

    if (!resp.ok) {
      clearTimeout(timer);
      let m = "";
      try { m = (JSON.parse(await resp.text()).error || {}).message || ""; } catch (_) {}
      throw new Error("Generator error (HTTP " + resp.status + ")" + (m ? ": " + m : "") + ". Check your key/billing, then try again.");
    }

    var state = { out: "", err: "" };
    try {
      if (resp.body && resp.body.getReader) {
        // proper incremental SSE read — keeps the connection alive on long generations
        var reader = resp.body.getReader();
        var dec = new TextDecoder();
        var buf = "";
        while (true) {
          var chunk = await reader.read();
          if (chunk.done) break;
          buf += dec.decode(chunk.value, { stream: true });
          var nl;
          while ((nl = buf.indexOf("\n")) >= 0) {
            drainLine(buf.slice(0, nl), state);
            buf = buf.slice(nl + 1);
          }
        }
        if (buf) drainLine(buf, state);
      } else {
        // fallback: no streaming body available, read whole text and parse
        var whole = await resp.text();
        whole.split("\n").forEach(function (l) { drainLine(l, state); });
        if (!state.out) { var p = parseClaudeBody(whole); if (p) state.out = p; }
      }
    } catch (e) {
      clearTimeout(timer);
      if (attempt < 2 && !state.out) continue;
    }
    clearTimeout(timer);

    if (state.err && !state.out) throw new Error("The model returned an error: " + state.err + ". Try again in a moment.");
    if (state.out && state.out.trim()) return state.out.trim();
    // empty — loop and retry
  }
  throw new Error("The generator kept coming back empty. Try again, or generate the week in a Claude chat and load the JSON via Weeks → Import.");
}

function parseClaudeBody(bodyText) {
  const t = (bodyText || "").trim();
  if (!t) return "";
  if (t[0] === "{" || t[0] === "[") {
    try {
      const data = JSON.parse(t);
      if (data && data.error && data.error.message) throw new Error(data.error.message);
      if (Array.isArray(data.content)) return data.content.map((b) => (typeof b === "string" ? b : (b && b.text) || "")).join("").trim();
      if (typeof data.content === "string") return data.content.trim();
      if (typeof data.completion === "string") return data.completion.trim();
      if (Array.isArray(data)) {
        let out = "";
        data.forEach((ev) => { if (ev && ev.delta && typeof ev.delta.text === "string") out += ev.delta.text;
          else if (ev && Array.isArray(ev.content)) out += ev.content.map((b) => (b && b.text) || "").join(""); });
        if (out.trim()) return out.trim();
      }
    } catch (e) {
      if (e.message && e.message.indexOf("JSON") === -1 && e.message.indexOf("Unexpected") === -1) throw e;
    }
  }
  if (t.indexOf("data:") !== -1) {
    let out = "";
    for (const line of t.split("\n")) {
      const s = line.trim();
      if (s.indexOf("data:") !== 0) continue;
      const payload = s.slice(5).trim();
      if (!payload || payload === "[DONE]") continue;
      try {
        const ev = JSON.parse(payload);
        if (ev && ev.delta && typeof ev.delta.text === "string") out += ev.delta.text;
        else if (ev && Array.isArray(ev.content)) out += ev.content.map((b) => (b && b.text) || "").join("");
      } catch (_) {}
    }
    if (out.trim()) return out.trim();
  }
  throw new Error("Unreadable response — the generator returned: " + t.slice(0, 160).replace(/\s+/g, " "));
}
function repairTruncated(t) {
  // track string state and open-bracket stack across the fragment
  var stack = [], inStr = false, esc = false;
  for (var i = 0; i < t.length; i++) {
    var c = t[i];
    if (inStr) { if (esc) esc = false; else if (c === "\\") esc = true; else if (c === '"') inStr = false; continue; }
    if (c === '"') { inStr = true; continue; }
    if (c === "{") stack.push("}");
    else if (c === "[") stack.push("]");
    else if (c === "}" || c === "]") stack.pop();
  }
  var out = t;
  if (inStr) out += '"';                                   // close an unterminated string
  var prev;
  do {
    prev = out;
    out = out.replace(/:\s*$/, ": null");                  // key with no value -> null
    out = out.replace(/([{,]\s*)"[^"]*"\s*$/, "$1");       // dangling lone key/element -> drop it
    out = out.replace(/,\s*$/, "");                        // trailing comma
  } while (out !== prev);
  while (stack.length) out += stack.pop();                  // close everything still open
  return out;
}
function extractJSON(text) {
  var clean = text.replace(/```json|```/g, "").trim();
  var first = clean.indexOf("{");
  if (first === -1) throw new Error("The model didn't return JSON.");
  // bracket-aware scan for the true end of the top-level object (string-safe)
  var stack = 0, inStr = false, esc = false, endAt = -1;
  for (var i = first; i < clean.length; i++) {
    var c = clean[i];
    if (inStr) { if (esc) esc = false; else if (c === "\\") esc = true; else if (c === '"') inStr = false; continue; }
    if (c === '"') { inStr = true; continue; }
    if (c === "{" || c === "[") stack++;
    else if (c === "}" || c === "]") { stack--; if (stack === 0) { endAt = i; break; } }
  }
  var body = endAt !== -1 ? clean.slice(first, endAt + 1) : repairTruncated(clean.slice(first));
  var fixes = [
    body,
    body.replace(/,(\s*[}\]])/g, "$1"),                                        // trailing commas
    body.replace(/,(\s*[}\]])/g, "$1").replace(/}(\s*){/g, "},$1{").replace(/](\s*)\[/g, "],$1["), // missing commas
    repairTruncated(body).replace(/,(\s*[}\]])/g, "$1"),                       // belt & suspenders
  ];
  for (var f = 0; f < fixes.length; f++) { try { return JSON.parse(fixes[f]); } catch (_) {} }
  throw new Error("Couldn't read the model's response as JSON — tap the button again.");
}

      return <div key={m.id} onClick={() => toggle(m.id)} style={{ cursor: "pointer", marginBottom: 10, padding: "13px 15px",
        borderRadius: 13, background: on ? T.greenBg : T.redBg, border: `1.5px solid ${on ? T.green : T.red}`, transition: "all .2s ease" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 2 }}>
              <span style={{ fontSize: 10, fontWeight: 800, textTransform: "uppercase", letterSpacing: ".1em", color: on ? T.green : T.red }}>{m.slot}</span>
              {m.out && <Tag text="out" />}{m.cook && <Tag text="cook" />}
            </div>
            <div style={{ fontSize: 15.5, fontWeight: 700, color: T.ink }}>{m.name}</div>
            {m.note && <div style={{ fontSize: 12, color: T.muted, marginTop: 2 }}>{m.note}</div>}
            <div style={{ fontSize: 11.5, color: T.muted, marginTop: 5, fontVariantNumeric: "tabular-nums" }}>{m.kcal} kcal · {m.p}p · {m.c}c · {m.f}f</div>
            <div style={{ marginTop: 8 }}>
              <ThumbPair state={tv} size={14} onUp={() => thumb(m.name, 1)} onDown={() => thumb(m.name, -1)} />
            </div>
          </div>
          <span style={{ width: 30, height: 30, flexShrink: 0, borderRadius: "50%", border: `2px solid ${on ? T.green : T.red}`,
            background: on ? T.green : "transparent", display: "flex", alignItems: "center", justifyContent: "center" }}>
            {on && <Check size={17} color="#fff" strokeWidth={3} />}</span>
        </div>
      </div>; })}
    <SuppCard />
    <p style={{ fontSize: 11.5, color: T.muted, textAlign: "center", marginTop: 10 }}>
      Tap a meal to log it · thumbs teach the generator your taste.</p>
  </div>;
}

/* ================= deterministic week assembly =================
   Everything except the 2 batch recipes is a known building block.
   The week is assembled on-device; no big LLM call needed. */
const BLOCKS = {
  shakeMilk: { slot: "Breakfast", name: "Whey shake", note: "3 scoops + 1½ cups whole milk", kcal: 533, protein: 75, carbs: 24, fat: 18, na: 308 },
  shakeWater: { slot: "Snack", name: "Whey shake", note: "with water, at work", kcal: 309, protein: 63, carbs: 6, fat: 6, na: 150 },
  bar: { slot: "Snack", name: "Protein bar", note: "Barebells or similar", kcal: 200, protein: 20, carbs: 20, fat: 7, na: 190 },
  cottage: { slot: "Snack", name: "Cottage cheese", note: "½ cup", kcal: 90, protein: 12, carbs: 4, fat: 2, na: 350 },
  cottageBerries: { slot: "Snack", name: "Cottage cheese + berries", note: "½ cup + 1 cup frozen berries", kcal: 160, protein: 13, carbs: 21, fat: 2, na: 350 },
  berriesString: { slot: "Snack", name: "Berries + string cheese", note: "1 cup + 1 stick", kcal: 150, protein: 8, carbs: 18, fat: 6, na: 160 },
  chocFruit: { slot: "Evening", name: "Chocolate-covered frozen fruit", note: "", kcal: 150, protein: 1, carbs: 20, fat: 7, na: 10 },
  string2: { slot: "Evening", name: "String cheese ×2", note: "", kcal: 160, protein: 14, carbs: 2, fat: 12, na: 320 },
  sunLunch: { slot: "Lunch", name: "Tuna, rice & veggie bowl", note: "Zero-cook • tuna + rice pouches + veg + olive oil", kcal: 1080, protein: 56, carbs: 150, fat: 28, na: 780 },
  chipotle: { slot: "Lunch", name: "Chipotle bowl", note: "Modified • out", kcal: 880, protein: 85, carbs: 89, fat: 23, na: 1450, tags: ["out"] },
  roti: { slot: "Lunch", name: "Roti bowl", note: "Modified • out", kcal: 1045, protein: 79, carbs: 73, fat: 47, na: 1600, tags: ["out"] },
  cava: { slot: "Lunch", name: "Cava-style bowl", note: "out", kcal: 850, protein: 77, carbs: 53, fat: 40, na: 1300, tags: ["out"] },
};
const MID_WORK = ["shakeWater", "bar"];                                  // workday snack rules
const MID_HOME = ["bar", "cottage", "berriesString", "shakeWater"];      // home days
const EVENING = ["chocFruit", "cottageBerries", "cottage", "berriesString", "string2"];

function mealFromBlock(key, over) { return Object.assign({}, BLOCKS[key], over || {}); }
function dinnerFrom(c, note, tags) {
  const ps = (c && c.perServing) || {};
  return { slot: "Dinner", name: c.name, note: note, kcal: +ps.kcal || 900, protein: +ps.protein || 70,
    carbs: +ps.carbs || 80, fat: +ps.fat || 28, na: +ps.na || 700, tags: tags };
}
function lunchFrom(c, note) { const d = dinnerFrom(c, note); d.slot = "Lunch"; delete d.tags; return d; }

/* choose the midday + evening snack pair that best closes the day's protein/kcal gap */
function pickSnacks(fixed, targets, midKeys, counts) {
  const base = fixed.reduce((a, m) => ({ k: a.k + m.kcal, p: a.p + m.protein }), { k: 0, p: 0 });
  let best = null;
  midKeys.forEach(function (mk) { EVENING.forEach(function (ek) {
    const k = base.k + BLOCKS[mk].kcal + BLOCKS[ek].kcal;
    const p = base.p + BLOCKS[mk].protein + BLOCKS[ek].protein;
    const floor = 0.9 * targets.protein;
    const score = (p < floor ? (floor - p) * 25 : 0) + Math.abs(k - targets.kcal);
    if (!best || score < best.score) best = { mk: mk, ek: ek, score: score };
  }); });
  counts[best.mk] = (counts[best.mk] || 0) + 1;
  counts[best.ek] = (counts[best.ek] || 0) + 1;
  return [mealFromBlock(best.mk, { slot: "Snack" }), mealFromBlock(best.ek, { slot: "Evening" })];
}

function sleep(ms) { return new Promise(function (r) { setTimeout(r, ms); }); }

function scheduleDinners(A, B) {
  function d(name, lunch, dinner) { return { day: name, lunch: lunch, dinner: dinner }; }
  return [
    d("Sun", mealFromBlock("sunLunch"), dinnerFrom(A, "Recipe A \u2022 fresh cook — batch covers Sun\u2013Wed", ["cook"])),
    d("Mon", mealFromBlock("chipotle"), dinnerFrom(A, "Recipe A \u2022 leftover")),
    d("Tue", mealFromBlock("roti"), dinnerFrom(A, "Recipe A \u2022 leftover")),
    d("Wed", mealFromBlock("cava"), dinnerFrom(A, "Recipe A \u2022 last — cook Recipe B tonight", ["cook"])),
    d("Thu", mealFromBlock("chipotle"), dinnerFrom(B, "Recipe B \u2022 fresh")),
    d("Fri", lunchFrom(B, "Recipe B \u2022 leftover \u2022 WFH"), dinnerFrom(B, "Recipe B \u2022 leftover")),
    d("Sat", lunchFrom(B, "Recipe B \u2022 leftover"), dinnerFrom(B, "Recipe B \u2022 last")),
  ];
}
function marshalSnacks(sched, targets) {
  const counts = {};
  const midMap = { Sun: MID_HOME, Mon: MID_WORK, Tue: MID_WORK, Wed: MID_WORK, Thu: MID_WORK, Fri: MID_HOME, Sat: MID_HOME };
  const days = sched.map(function (s) {
    const picks = pickSnacks([BLOCKS.shakeMilk, s.lunch, s.dinner], targets, midMap[s.day], counts);
    return { day: s.day, meals: [mealFromBlock("shakeMilk"), s.lunch, picks[0], s.dinner, picks[1]] };
  });
  return { days: days, counts: counts };
}

function sodiumNotes(days) {
  const notes = [];
  days.forEach(function (d) {
    const na = d.meals.reduce(function (n, m) { return n + (m.na || 0); }, 0);
    if (na > 3000) notes.push(d.day + " ~" + na + "mg sodium — hard flag: skip or halve the saltiest sauce at dinner (−400–600mg).");
    else if (na > 2300) notes.push(d.day + " ~" + na + "mg — above the 2,300mg guideline; go easy on added sauces.");
  });
  return notes.join(" ");
}

function meatPounds(concept, servings) {
  var pPer = (concept && concept.perServing && +concept.perServing.protein) || 85;
  var cookedG = (pPer * 0.85) / 0.29;   // grams cooked meat per serving (~29g protein/100g cooked)
  var rawG = cookedG / 0.75;            // raw = cooked / yield
  var lb = Math.ceil(((rawG * servings) / 453.6) * 2) / 2;  // round up to 0.5 lb
  var trays = Math.max(1, Math.ceil(lb / 1.25));            // TJ's trays ~1\u20131.5 lb
  var lbStr = (lb % 1 === 0) ? String(lb) : lb.toFixed(1);
  return "~" + lbStr + " lb raw (" + trays + " tray" + (trays > 1 ? "s" : "") + ")";
}
function buildGrocery(A, B, counts) {
  var milkCups = 7 * 1.5;  // one morning milk shake per day
  var scoops = 21 + 2 * (counts.shakeWater || 0);
  var sticks = (counts.berriesString || 0) + 2 * (counts.string2 || 0);
  var berryCups = (counts.berriesString || 0) + (counts.cottageBerries || 0);
  var cot = (counts.cottage || 0) + (counts.cottageBerries || 0);
  return [
    { section: "Meat & Seafood", items: [
      { name: A.name + " — protein", qty: meatPounds(A, 4) },
      (B !== A ? { name: B.name + " — protein", qty: meatPounds(B, 5) } : null),
    ].filter(Boolean) },
    { section: "Dairy & Refrigerated", items: [
      { name: "Whole milk (morning shakes only)", qty: "1 gallon — 7 \u00d7 1\u00bd cups \u2248 " + Math.round(milkCups) + " cups" },
      { name: "Cottage cheese, low-sodium", qty: cot + " \u00d7 \u00bd-cup" },
      { name: "String cheese", qty: sticks + " sticks" },
    ] },
    { section: "Frozen", items: [
      { name: "Veg for " + A.name, qty: "~2 bags" },
      (B !== A ? { name: "Veg for " + B.name, qty: "~2 bags" } : null),
      { name: "Mixed berries", qty: berryCups + " cups" },
      (counts.chocFruit ? { name: "Chocolate-covered frozen fruit", qty: "1 bag" } : null),
    ].filter(Boolean) },
    { section: "Grains", items: [
      { name: "Jasmine rice pouches, 90-sec", qty: "~8" },
    ] },
    { section: "Pantry & Sauces", items: [
      { name: "Tuna packets (Sunday lunch)", qty: "2" },
      { name: "Sauce / aromatics for " + A.name, qty: "check pantry" },
      (B !== A ? { name: "Sauce / aromatics for " + B.name, qty: "check pantry" } : null),
      { name: "Olive oil", qty: "check pantry" },
    ].filter(Boolean) },
    { section: "Supplements & Snacks", items: [
      { name: "Whey protein", qty: "\u2248" + scoops + " scoops this week — restock if low" },
      { name: "Protein bars (Barebells or similar)", qty: String(counts.bar || 0) },
    ] },
  ];
}

/* ================= Generate (Plan tab) ================= */
function Generate({ taste, thumb, weeks, onPlanReady }) {
  const [phase, setPhase] = useState("input"); // input | proposing | proposal | building | error
  const [checkin, setCheckin] = useState("");
  const [proposal, setProposal] = useState(null);
  const [conceptVotes, setConceptVotes] = useState({});
  const [stage, setStage] = useState("");
  const [err, setErr] = useState("");
  const [apiKey, setApiKey] = useState("");
  const [keyOpen, setKeyOpen] = useState(false);
  const [keySaved, setKeySaved] = useState(false);
  const [copied, setCopied] = useState(false);
  const lastWeeks = weeks.slice(0, 2).map((w) => w.label).join(", ");

  useEffect(() => { (async () => { const k = await store.get(KEY_STORE); if (k) { setApiKey(k); setKeySaved(true); } })(); }, []);
  const saveKey = async () => { const k = apiKey.trim(); await store.set(KEY_STORE, k); setKeySaved(!!k); };
  const clearKey = async () => { await store.set(KEY_STORE, ""); setApiKey(""); setKeySaved(false); };

  async function propose(revision) {
    setPhase("proposing"); setErr(""); setStage("Planning feasts…");
    try {
      const hist = (await store.get(CHECKINS)) || [];
      const histLines = hist.map(function (h) { return "- " + new Date(h.ts).toLocaleDateString("en-US", { month: "short", day: "numeric" }) + ": " + h.text; }).join("\n");
      let fb = "";
      if (revision && proposal) {
        fb = "\nPREVIOUS PROPOSAL AND THE USER'S VOTES (revise accordingly; keep 👍 concepts, replace 👎 ones):\n" +
          proposal.concepts.map((c, i) => `- ${c.name}: ${conceptVotes[i] === 1 ? "THUMBS UP" : conceptVotes[i] === -1 ? "THUMBS DOWN" : "no vote"}`).join("\n");
      }
      const out = await askClaude(RULES,
        `Propose the home-cooked side of next week's plan (week starting ${nextSunday()}). Recent weeks (vary from them): ${lastWeeks || "unknown — vary from a chicken stir-fry + masala turkey week"}.
${tasteSummary(taste)}
PREVIOUS CHECK-INS (for trends — most recent last; the last reported weight is the "last known weight"):
${histLines || "none recorded yet — last known weight is the profile's ~265 lb"}
THIS WEEK'S CHECK-IN (apply the Adjustment Protocol and Weight-Driven Recompute if triggered): ${checkin || "no check-in given — keep the previous targets and note the assumption"}.${fb}
Return ONLY JSON: {"targets":{"kcal":N,"protein":N,"carbs":N,"fat":N},"targetNote":"one line on any adjustment or 'unchanged'","concepts":[{"name":"...","desc":"protein, carb, veg, sauce style — one line","prep":"active prep + pan count, e.g. '~20 min · 1 pan'","servings":N,"covers":"which meals/nights","perServing":{"kcal":N,"protein":N,"carbs":N,"fat":N,"na":N}}],"fridayAndWeekend":"one line — batch leftovers / zero-cook assembly only","snacks":"one line","cookDays":"one line"}
Exactly 2 batch recipe concepts (the hard cap), plus optionally 1 alternate marked in its name with '(alt)'. Each concept MUST be ≤30 min active prep and ≤2 pans — state it honestly in "prep".`, 6000);
      let p;
      try { p = extractJSON(out); }
      catch (e1) {
        const fix = await askClaude(RULES, `That JSON was malformed ("${e1.message}"). Return ONLY the corrected, COMPLETE JSON with the same content, nothing else:\n${out.slice(0, 6000)}`, 6000);
        p = extractJSON(fix);
      }
      if (!p.concepts || !p.concepts.length) throw new Error("No concepts returned.");
      if (!revision && checkin.trim()) {
        const nh = hist.concat([{ ts: Date.now(), text: checkin.trim() }]).slice(-4);
        store.set(CHECKINS, nh);
      }
      setProposal(p); setConceptVotes({}); setPhase("proposal");
    } catch (e) { setErr(e.message); setPhase(proposal ? "proposal" : "input"); }
  }

  function chooseTwo() {
    const cs = proposal.concepts;
    const idxs = cs.map(function (_, i) { return i; });
    const notDown = idxs.filter(function (i) { return conceptVotes[i] !== -1; });
    const up = notDown.filter(function (i) { return conceptVotes[i] === 1; });
    const nonAlt = function (i) { return !/\(alt\)/i.test(cs[i].name || ""); };
    const chosen = [];
    const add = function (i) { if (chosen.length < 2 && chosen.indexOf(i) === -1) chosen.push(i); };
    up.forEach(add);                       // thumbs-up always included (first two win)
    notDown.filter(nonAlt).forEach(add);   // then non-alt survivors
    notDown.forEach(add);                  // then anything left
    return chosen.map(function (i) { return cs[i]; });
  }

  async function build() {
    setPhase("building"); setErr("");
    try {
      const chosen = chooseTwo();
      const A = chosen[0], B = chosen[1] || chosen[0];
      setStage("Scheduling feasts…"); await sleep(850);
      const sched = scheduleDinners(A, B);
      setStage("Marshaling snacks…"); await sleep(850);
      const asm = marshalSnacks(sched, proposal.targets);
      const raw = {
        weekStart: nextSunday(),
        targets: proposal.targets,
        days: asm.days,
        grocery: buildGrocery(A, B, asm.counts),
        recipes: (B === A ? [A] : [A, B]),
        notes: [
          proposal.targetNote && proposal.targetNote !== "unchanged" ? proposal.targetNote : "",
          sodiumNotes(asm.days),
          B === A ? "Only one recipe approved — it covers the whole week, so expect repetition." : "",
        ].filter(Boolean).join(" "),
      };
      normalizePlan(raw); // validate before saving
      onPlanReady(raw);
      setStage(""); setPhase("input"); setProposal(null); setCheckin("");
    } catch (e) { setStage(""); setErr("Build failed: " + e.message + " — tap build again."); setPhase("proposal"); }
  }

  function fullBuildPrompt() {
    const chosen = proposal.concepts.filter((c, i) => conceptVotes[i] !== -1);
    const ws = nextSunday();
    return `${RULES}

=== TASK ===
Build the FULL 7-day plan (week starting ${ws}) from these APPROVED batch recipes: ${JSON.stringify(chosen)}.
Targets: ${JSON.stringify(proposal.targets)} (${proposal.targetNote}). ${tasteSummary(taste)}
Every day must satisfy the tolerance bands; estimate sodium ("na") per meal; Mon–Thu lunch = a cached restaurant bowl (Chipotle/Roti/Cava), Fri WFH, breakfast = whey shake; batch dinners repeat as leftovers; grocery list in store-walk sections, yield-adjusted and package-rounded.
Return ONLY JSON, no prose, no markdown fences, no trailing commas: {"weekStart":"${ws}","targets":{"kcal":N,"protein":N,"carbs":N,"fat":N},"days":[{"day":"Sun","meals":[{"slot":"...","name":"...","note":"...","kcal":N,"protein":N,"carbs":N,"fat":N,"na":N,"tags":["out"|"cook"]}]} — one object per day, Sun through Sat, 7 total],"grocery":[{"section":"...","items":[{"name":"...","qty":"..."}]}],"notes":"sodium flags with concrete fixes, band misses, target changes"}`;
  }
  async function copyPrompt() {
    const text = fullBuildPrompt();
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) { await navigator.clipboard.writeText(text); }
      else {
        const ta = document.createElement("textarea");
        ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
        document.body.appendChild(ta); ta.focus(); ta.select();
        document.execCommand("copy"); document.body.removeChild(ta);
      }
      setCopied(true); setTimeout(() => setCopied(false), 2500);
    } catch (e) { setErr("Couldn't copy automatically — long-press to select the prompt manually."); }
  }

  const box = { background: "#fff", borderRadius: 14, border: "1px solid #E3E0D6", padding: 16, marginBottom: 14 };
  return <div style={{ padding: "8px 16px 16px" }}>
    <Header title="Plan next week" sub={"Week starting " + nextSunday()} />
    {phase === "input" && <>
      <div style={box}>
        <div onClick={() => setKeyOpen((o) => !o)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }}>
          <div style={{ fontSize: 13.5, fontWeight: 800 }}>AI generator <span style={{ color: keySaved ? T.green : T.muted }}>· {keySaved ? "connected ✓" : "off"}</span></div>
          <ChevronDown size={16} style={{ transform: keyOpen ? "rotate(180deg)" : "none", transition: "transform .2s" }} />
        </div>
        {keyOpen && <div style={{ marginTop: 10 }}>
          <div style={{ fontSize: 12.5, color: T.muted, marginBottom: 8, lineHeight: 1.45 }}>
            Optional. Paste an Anthropic API key to generate plans right here — it's stored only on this device and sent straight to Anthropic. Without it, generate in a Claude chat and load the JSON via Weeks → Import.</div>
          <input type="password" value={apiKey} onChange={(e) => setApiKey(e.target.value)} placeholder="sk-ant-…"
            style={{ width: "100%", boxSizing: "border-box", borderRadius: 10, border: "1px solid #D5D2C7", padding: 11, fontSize: 13, fontFamily: "ui-monospace, Menlo, monospace" }} />
          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            <button onClick={saveKey} style={{ flex: 1, padding: "11px 0", borderRadius: 10, border: "none", cursor: "pointer", background: T.ink, color: "#fff", fontWeight: 800, fontSize: 13 }}>Save key</button>
            {keySaved && <button onClick={clearKey} style={{ flex: 1, padding: "11px 0", borderRadius: 10, border: "1px solid #D5D2C7", cursor: "pointer", background: "#fff", color: T.ink, fontWeight: 800, fontSize: 13 }}>Remove</button>}
          </div>
        </div>}
      </div>
      <div style={box}>
        <div style={{ fontSize: 13.5, fontWeight: 800, marginBottom: 6 }}>Check-in</div>
        <div style={{ fontSize: 12.5, color: T.muted, marginBottom: 8 }}>How's the scale trending, and how did last week actually go? (Drives the calorie adjustment protocol — leave blank to keep current targets.)</div>
        <textarea value={checkin} onChange={(e) => setCheckin(e.target.value)} placeholder="e.g. Down 1.3 lb this week, lifts steady. Skipped two evening snacks."
          style={{ width: "100%", minHeight: 70, boxSizing: "border-box", borderRadius: 10, border: "1px solid #D5D2C7", padding: 10, fontSize: 14, fontFamily: UI, resize: "vertical" }} />
      </div>
      <TasteCard taste={taste} thumb={thumb} />
      <button onClick={() => propose(false)} style={{ width: "100%", padding: "15px 0", borderRadius: 12, border: "none",
        cursor: "pointer", background: T.ink, color: "#fff", fontSize: 15.5, fontWeight: 800, display: "flex",
        alignItems: "center", justifyContent: "center", gap: 8 }}>
        <Sparkles size={18} /> Suggest this week's meals</button>
      {err && <div style={{ color: T.red, fontSize: 12.5, fontWeight: 600, marginTop: 10 }}>{err}</div>}
    </>}
    {(phase === "proposing" || phase === "building") && <div style={{ textAlign: "center", padding: "50px 20px" }}>
      <RefreshCw size={26} color={T.muted} style={{ animation: "spin 1.2s linear infinite" }} />
      <style>{"@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}"}</style>
      <div style={{ fontSize: 14, fontWeight: 700, color: T.muted, marginTop: 12 }}>
        {stage || (phase === "proposing" ? "Planning feasts…" : "Working…")}</div>
    </div>}
    {phase === "proposal" && proposal && <>
      <div style={{ ...box, borderColor: T.ink, borderWidth: 2 }}>
        <div style={{ fontSize: 12, fontWeight: 800, textTransform: "uppercase", letterSpacing: ".1em", marginBottom: 4 }}>Targets</div>
        <div style={{ fontSize: 13.5, fontVariantNumeric: "tabular-nums" }}>
          {proposal.targets.kcal} kcal · {proposal.targets.protein}p · {proposal.targets.carbs}c · {proposal.targets.fat}f</div>
        <div style={{ fontSize: 12, color: T.muted, marginTop: 3 }}>{proposal.targetNote}</div>
      </div>
      <div style={{ fontSize: 13, fontWeight: 800, margin: "2px 0 8px" }}>Batch recipes — vote before building</div>
      {proposal.concepts.map((c, i) => <div key={i} style={{ ...box, marginBottom: 10 }}>
        <div style={{ display: "flex", justifyContent: "space-between", gap: 10, alignItems: "flex-start" }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 15, fontWeight: 800 }}>{c.name}</div>
            <div style={{ fontSize: 12.5, color: T.muted, marginTop: 3 }}>{c.desc}</div>
            {c.prep && <div style={{ display: "inline-block", fontSize: 11, fontWeight: 800, color: T.green,
              background: T.greenBg, borderRadius: 6, padding: "2px 7px", marginTop: 6 }}>{c.prep}</div>}
            <div style={{ fontSize: 11.5, color: T.muted, marginTop: 5, fontVariantNumeric: "tabular-nums" }}>
              {c.servings} servings · {c.covers}<br />
              ~{c.perServing?.kcal} kcal · {c.perServing?.protein}p · {c.perServing?.carbs}c · {c.perServing?.fat}f / serving</div>
          </div>
          <ThumbPair state={conceptVotes[i] ?? 0}
            onUp={() => setConceptVotes((v) => ({ ...v, [i]: v[i] === 1 ? 0 : 1 }))}
            onDown={() => setConceptVotes((v) => ({ ...v, [i]: v[i] === -1 ? 0 : -1 }))} />
        </div>
      </div>)}
      <div style={box}>
        <div style={{ fontSize: 12.5 }}><b>Fri + weekend:</b> <span style={{ color: T.muted }}>{proposal.fridayAndWeekend}</span></div>
        <div style={{ fontSize: 12.5, marginTop: 5 }}><b>Snacks:</b> <span style={{ color: T.muted }}>{proposal.snacks}</span></div>

        <button onClick={build} disabled={proposal.concepts.every((c, i) => conceptVotes[i] === -1)}
          style={{ flex: 1.4, padding: "14px 0", borderRadius: 12, border: "none", cursor: "pointer",

        Your votes here are saved to your taste history too.</p>

        <div style={{ fontSize: 12, color: T.muted, lineHeight: 1.5, marginBottom: 10 }}>
          The full-week build can time out on phone data. This never does: copy the prompt, paste it into any Claude chat, copy the JSON it returns, then load it in Weeks → Import.</div>
        <button onClick={copyPrompt} disabled={proposal.concepts.every((c, i) => conceptVotes[i] === -1)}

/* ================= History ================= */
function WeekCard({ w, live }) {
  const [open, setOpen] = useState(live);
  const perDay = w.plan.days.map((d) => {
    const s = d.meals.reduce((a, m) => { if (w.eaten[m.id]) { a.n += 1; a.kcal += m.kcal; } return a; }, { n: 0, kcal: 0 });
    return { day: d.day, total: d.meals.length, ...s };
  });
  return <div style={{ background: "#fff", borderRadius: 14, border: "1px solid #E3E0D6", overflow: "hidden", marginBottom: 12 }}>
    <button onClick={() => setOpen((o) => !o)} style={{ width: "100%", display: "flex", alignItems: "center", gap: 16,
      padding: 16, background: "none", border: "none", cursor: "pointer", textAlign: "left" }}>
      <div style={{ position: "relative", width: 76, height: 76, flexShrink: 0 }}>
        <Ring pct={w.pct} />
        <span style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 18, fontWeight: 900, fontVariantNumeric: "tabular-nums" }}>{w.pct}%</span></div>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 15.5, fontWeight: 800 }}>{w.label}</div>
        <div style={{ fontSize: 13, color: T.muted, marginTop: 2 }}>{w.ate} of {w.total} planned meals eaten</div>
        {live && <div style={{ fontSize: 12, fontWeight: 700, color: T.green, marginTop: 4 }}>Current week · live</div>}
      </div>
      <ChevronDown size={20} color={T.muted} style={{ transform: open ? "rotate(180deg)" : "none", transition: "transform .2s" }} />
    </button>
    {open && <div style={{ borderTop: "1px solid #ECEAE1", padding: "6px 16px 14px" }}>
      {perDay.map((p, i) => <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "9px 0", borderBottom: "1px solid #F1EFE7" }}>
        <span style={{ width: 34, fontSize: 13, fontWeight: 800 }}>{p.day}</span>
        <div style={{ flex: 1 }}><Bar value={p.n} target={p.total} color={p.n === p.total ? T.green : T.amber} /></div>
        <span style={{ fontSize: 12, fontWeight: 700, color: T.muted, width: 34, textAlign: "right", fontVariantNumeric: "tabular-nums" }}>{p.n}/{p.total}</span>
        <span style={{ fontSize: 11.5, color: T.faint, width: 62, textAlign: "right", fontVariantNumeric: "tabular-nums" }}>{p.kcal ? `${p.kcal}kcal` : "—"}</span>
      </div>)}
      {w.plan.notes && <div style={{ fontSize: 12, color: T.muted, marginTop: 10, lineHeight: 1.5 }}><b>Plan notes:</b> {w.plan.notes}</div>}
    </div>}
  </div>;
}
function History({ hist, activeKey, getBackup, onRestore }) {
  const [mode, setMode] = useState(null); // null | "backup" | "restore"
  const [bk, setBk] = useState("");
  const [rs, setRs] = useState("");
  const [msg, setMsg] = useState("");
  const openBackup = async () => {
    setMode("backup"); setMsg(""); setBk("Preparing backup…");
    try { setBk(await getBackup()); } catch (e) { setBk(""); setMsg("Couldn't build the backup — try again."); }
  };
  const doRestore = () => { const e = onRestore(rs); setMsg(e || "Restored ✓"); if (!e) { setRs(""); setMode(null); } };
  const btn = (on) => ({ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 7, padding: "12px 0",
    borderRadius: 10, cursor: "pointer", background: on ? T.ink : "#fff", color: on ? "#fff" : T.ink,
    border: on ? "none" : "1px solid #D5D2C7", fontSize: 14, fontWeight: 800, fontFamily: UI });
  const ta = { width: "100%", minHeight: 80, boxSizing: "border-box", borderRadius: 10, border: "1px solid #D5D2C7",
    padding: 10, fontSize: 11, fontFamily: "ui-monospace, Menlo, monospace", background: "#fff", resize: "vertical" };
  return <div style={{ padding: "8px 16px 16px" }}>
    <Header title="History" sub="Adherence over time" />
    <div style={{ background: "#fff", borderRadius: 14, border: "1px solid #E3E0D6", padding: 14, marginBottom: 16 }}>
      <div style={{ display: "flex", gap: 10 }}>
        <button onClick={openBackup} style={btn(mode === "backup")}><Download size={16} /> Back up</button>
        <button onClick={() => { setMode(mode === "restore" ? null : "restore"); setMsg(""); }} style={btn(mode === "restore")}><Upload size={16} /> Restore</button>
      </div>
      <div style={{ fontSize: 11.5, color: T.muted, marginTop: 8, lineHeight: 1.45 }}>
        Your data is saved on this device. Copy a backup before clearing your browser data or switching devices — paste it back here to restore your weeks, check-offs, and taste history. (Your API key is never included in a backup.)</div>
      {mode === "backup" && <div style={{ marginTop: 10 }}>
        <textarea readOnly value={bk} onFocus={(e) => e.target.select()} style={ta} />
        <div style={{ fontSize: 11.5, color: T.muted, marginTop: 4 }}>Tap the box to select all, then copy it somewhere safe.</div>
      </div>}
      {mode === "restore" && <div style={{ marginTop: 10 }}>
        <textarea value={rs} onChange={(e) => setRs(e.target.value)} placeholder="Paste a backup here…" style={ta} />
        <button onClick={doRestore} disabled={!rs.trim()} style={{ width: "100%", marginTop: 8, padding: "12px 0", borderRadius: 10,
          border: "none", cursor: rs.trim() ? "pointer" : "default", background: rs.trim() ? T.ink : "#CFD3C9", color: "#fff",
          fontSize: 14, fontWeight: 800 }}>Restore backup</button>
      </div>}
      {msg && <div style={{ fontSize: 12.5, fontWeight: 700, color: msg.indexOf("✓") !== -1 ? T.green : T.red, marginTop: 8 }}>{msg}</div>}
    </div>
    {hist.length === 0 && <div style={{ fontSize: 13, color: T.muted, textAlign: "center", marginTop: 30 }}>No weeks yet.</div>}
    {hist.map((w) => <WeekCard key={w.key} w={w} live={w.key === activeKey} />)}
  </div>;
}

/* ================= Cook ================= */
function Cook({ plan }) {
  const [ins, setIns] = useState({});
  const [busy, setBusy] = useState({});
  const [errs, setErrs] = useState({});

  const recipes = (plan.recipes && plan.recipes.length) ? plan.recipes
    : plan.days.flatMap((d) => d.meals)
        .filter((m) => m.slot === "Dinner" && !m.out)
        .filter((m, i, a) => a.findIndex((x) => normName(x.name) === normName(m.name)) === i)
        .map((m) => ({ name: m.name, desc: m.note || "", prep: "", servings: 4,
          perServing: { kcal: m.kcal, protein: m.p, carbs: m.c, fat: m.f, na: m.na } }));

  useEffect(() => { (async () => {
    const loaded = {};
    for (const r of recipes) {
      const v = await store.get("cookins-" + normName(r.name));
      if (v) loaded[normName(r.name)] = v;
    }
    setIns(loaded);
  })(); }, [plan.weekKey]);

  async function fetchIns(r) {
    const k = normName(r.name);
    setBusy((b) => ({ ...b, [k]: true })); setErrs((e) => ({ ...e, [k]: "" }));
    try {
      const out = await askClaude(RULES,
        `Write the cooking instructions for this batch recipe: ${JSON.stringify({ name: r.name, desc: r.desc, servings: r.servings || 4, perServing: r.perServing })}.
Hard requirements: ≤30 min active prep, ≤2 pans/pots total, NO added salt (season per the rules), rice = 90-second pouches (never stovetop rice), Trader Joe's products by default. Scale ingredient quantities to make ALL ${r.servings || 4} servings in one batch.
Return ONLY JSON: {"name":"...","time":"~NN min active","pans":"1 pan|1 pot|2 pans","ingredients":[{"item":"...","qty":"..."}],"steps":["short imperative step", "..."],"storage":"fridge/freezer + reheat note"}`, 3000);
      const parsed = extractJSON(out);
      if (!parsed.steps || !parsed.steps.length) throw new Error("No steps returned.");
      await store.set("cookins-" + k, parsed);
      setIns((m) => ({ ...m, [k]: parsed }));
    } catch (e) { setErrs((er) => ({ ...er, [k]: e.message })); }
    setBusy((b) => ({ ...b, [k]: false }));
  }

  const box = { background: "#fff", borderRadius: 14, border: "1px solid #E3E0D6", padding: 16, marginBottom: 14 };
  const chip = { display: "inline-block", fontSize: 11, fontWeight: 800, color: T.green, background: T.greenBg,
    borderRadius: 6, padding: "2px 7px", marginRight: 6 };
  return <div style={{ padding: "8px 16px 16px" }}>
    <Header title="Cook" sub={plan.weekLabel} />
    {recipes.length === 0 && <div style={{ fontSize: 13, color: T.muted, textAlign: "center", marginTop: 30 }}>
      No home-cooked recipes in this week’s plan.</div>}
    {recipes.map((r) => {
      const k = normName(r.name);
      const d = ins[k];
      return <div key={k} style={box}>
        <div style={{ fontSize: 16, fontWeight: 800 }}>{r.name}</div>
        {r.desc ? <div style={{ fontSize: 12.5, color: T.muted, marginTop: 3 }}>{r.desc}</div> : null}
        <div style={{ marginTop: 8 }}>
          {d && d.time ? <span style={chip}>{d.time}</span> : (r.prep ? <span style={chip}>{r.prep}</span> : null)}
          {d && d.pans ? <span style={chip}>{d.pans}</span> : null}
          <span style={{ ...chip, color: T.muted, background: "#F1EFE7" }}>{(r.servings || 4) + " servings"}</span>
        </div>
        {!d && <button onClick={() => fetchIns(r)} disabled={!!busy[k]}
          style={{ width: "100%", marginTop: 12, padding: "13px 0", borderRadius: 11, border: "none",
            cursor: busy[k] ? "default" : "pointer", background: busy[k] ? "#CFD3C9" : T.ink, color: "#fff",
            fontSize: 14, fontWeight: 800 }}>
          {busy[k] ? "Consulting the royal cookbook…" : "Get cooking instructions"}</button>}
        {errs[k] && <div style={{ color: T.red, fontSize: 12.5, fontWeight: 600, marginTop: 8 }}>{errs[k]} — tap the button to retry.</div>}
        {d && <div style={{ marginTop: 12 }}>
          <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: ".12em", textTransform: "uppercase",
            borderBottom: `2px solid ${T.ink}`, paddingBottom: 4, marginBottom: 6 }}>Ingredients</div>
          {(d.ingredients || []).map((it, i) => <div key={i} style={{ display: "flex", justifyContent: "space-between",
            gap: 10, padding: "6px 0", borderBottom: "1px solid #F1EFE7", fontSize: 13.5 }}>
            <span style={{ fontWeight: 600 }}>{it.item}</span>
            <span style={{ color: T.muted, flexShrink: 0 }}>{it.qty}</span></div>)}
          <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: ".12em", textTransform: "uppercase",
            borderBottom: `2px solid ${T.ink}`, paddingBottom: 4, margin: "14px 0 6px" }}>Steps</div>
          {(d.steps || []).map((st, i) => <div key={i} style={{ display: "flex", gap: 10, padding: "7px 0",
            borderBottom: "1px solid #F1EFE7", fontSize: 13.5, lineHeight: 1.45 }}>
            <span style={{ fontWeight: 900, color: T.green, flexShrink: 0 }}>{i + 1}</span>
            <span>{st}</span></div>)}
          {d.storage && <div style={{ fontSize: 12, color: T.muted, marginTop: 10, lineHeight: 1.5 }}>
            <b>Storage:</b> {d.storage}</div>}
          <button onClick={() => fetchIns(r)} disabled={!!busy[k]}
            style={{ marginTop: 12, padding: "9px 14px", borderRadius: 9, border: "1px solid #D5D2C7",
              cursor: "pointer", background: "#fff", color: T.muted, fontSize: 12.5, fontWeight: 700 }}>
            {busy[k] ? "Re-fetching…" : "Regenerate instructions"}</button>
        </div>}
      </div>;
    })}
    <p style={{ fontSize: 11.5, color: T.muted, textAlign: "center", marginTop: 4 }}>
      Instructions are fetched once per recipe and saved on this device.</p>
  </div>;
}

      <div style={{ fontSize: 11.5, color: T.muted, marginTop: 12, textAlign: "center" }}>Back up &amp; restore live at the top of the History tab.</div>

/* ================= app shell ================= */
function App() {
  const [tab, setTab] = useState("eat");
  const [sel, setSel] = useState(0);
  const [weeks, setWeeks] = useState([]);
  const [activeKey, setActiveKey] = useState(null);
  const [plan, setPlan] = useState(null);
  const [eaten, setEaten] = useState({});
  const [checked, setChecked] = useState({});
  const [taste, setTaste] = useState({});
  const [hist, setHist] = useState([]);
  const [sheet, setSheet] = useState(false);

  async function getBackup() {
    const dump = { idx: weeks, active: activeKey, taste };
    for (const w of weeks) {
      dump["plan-" + w.key] = await store.get("plan-" + w.key);
      dump["meals-" + w.key] = await store.get("meals-" + w.key);
      dump["grocery-" + w.key] = await store.get("grocery-" + w.key);
    }
    return JSON.stringify(dump);
  }

  async function activate(key, idx) {
    const raw = await store.get("plan-" + key);
    const p = normalizePlan(raw);
    setPlan(p); setActiveKey(key);
    setEaten((await store.get("meals-" + key)) || {});
    setChecked((await store.get("grocery-" + key)) || {});
    setSel(todayIndex(key, p.days.length));
    if (idx) setWeeks(idx);
    store.set(ACTIVE, key);
  }

  useEffect(() => {
    (async () => {
      let idx = await store.get(IDX);
      if (!idx || !idx.length) {
        const p = normalizePlan(SEED);
        await store.set("plan-" + p.weekKey, SEED);
        idx = [{ key: p.weekKey, label: p.weekLabel }];
        await store.set(IDX, idx); await store.set(ACTIVE, p.weekKey);
      }
      setTaste((await store.get(TASTE)) || {});
      await activate((await store.get(ACTIVE)) || idx[0].key, idx);
    })();
  }, []);

  useEffect(() => {
    (async () => {
      if (!weeks.length) { setHist([]); return; }
      const list = [];
      for (const w of weeks) {
        let p, e;
        if (w.key === activeKey && plan) { p = plan; e = eaten; }
        else { const raw = await store.get("plan-" + w.key); if (!raw) continue; p = normalizePlan(raw); e = (await store.get("meals-" + w.key)) || {}; }
        const total = p.days.reduce((n, d) => n + d.meals.length, 0);
        const ate = p.days.reduce((n, d) => n + d.meals.filter((m) => e[m.id]).length, 0);
        list.push({ key: w.key, label: p.weekLabel, plan: p, eaten: e, total, ate, pct: total ? Math.round((ate / total) * 100) : 0 });
      }
      setHist(list);
    })();
  }, [weeks, activeKey, plan, eaten]);

  const toggleCheck = (id) => setChecked((p) => { const n = { ...p, [id]: !p[id] }; store.set("grocery-" + activeKey, n); return n; });
  const toggleEat = (id) => setEaten((p) => { const n = { ...p, [id]: !p[id] }; store.set("meals-" + activeKey, n); return n; });
  const thumb = (name, v) => setTaste((p) => {
    const k = normName(name); const n = { ...p };
    const cur = n[k]?.v ?? 0;
    if (v === 0 || cur === v) delete n[k]; else n[k] = { name, v, ts: Date.now() };
    store.set(TASTE, n); return n;
  });

  function loadRaw(raw) {
    const p = normalizePlan(raw);
    store.set("plan-" + p.weekKey, raw);
    const idx = [{ key: p.weekKey, label: p.weekLabel }, ...weeks.filter((w) => w.key !== p.weekKey)].sort((a, b) => (a.key < b.key ? 1 : -1));
    store.set(IDX, idx);
    activate(p.weekKey, idx);
  }
  function handleImport(txt) {
    try { loadRaw(JSON.parse(txt)); setSheet(false); return null; }
    catch (e) { return e instanceof SyntaxError ? "That isn't valid JSON — check for a missing comma or bracket." : e.message; }
  }
  function handleRestore(txt) {
    try {
      const dump = JSON.parse(txt);
      if (!dump.idx) throw new Error("That doesn't look like a backup.");
      Object.entries(dump).forEach(([k, v]) => { if (k !== "idx" && k !== "active" && k !== "taste") store.set(k, v); });
      store.set(IDX, dump.idx); store.set(TASTE, dump.taste || {}); setTaste(dump.taste || {});
      activate(dump.active || dump.idx[0].key, dump.idx);
      setSheet(false); return null;
    } catch (e) { return e.message; }
  }
  function handleGenerated(raw) { loadRaw(raw); setTab("eat"); }

  if (!plan) return <div className="app-shell" style={{ fontFamily: UI, background: T.bg }} />;

  const tabs = [
    { id: "plan", label: "Plan", Icon: Sparkles },
    { id: "shop", label: "Shop", Icon: ShoppingCart },
    { id: "cook", label: "Cook", Icon: ChefHat },
    { id: "eat", label: "Eat", Icon: Utensils },
    { id: "history", label: "History", Icon: BarChart3 },
  ];
  return <div className="app-shell" style={{ fontFamily: UI, background: T.bg, color: T.ink, maxWidth: 448, margin: "0 auto",
    display: "flex", flexDirection: "column", overflow: "hidden" }}>
    <div style={{ flex: 1, minHeight: 0, overflowY: "auto", WebkitOverflowScrolling: "touch" }}>
      {tab === "shop" && <Shop plan={plan} checked={checked} toggle={toggleCheck} onWeek={() => setSheet(true)} />}
      {tab === "eat" && <Eat plan={plan} sel={sel} setSel={setSel} eaten={eaten} toggle={toggleEat} taste={taste} thumb={thumb} onWeek={() => setSheet(true)} />}
      {tab === "plan" && <Generate taste={taste} thumb={thumb} weeks={weeks} onPlanReady={handleGenerated} />}
      {tab === "cook" && <Cook plan={plan} />}
      {tab === "history" && <History hist={hist} activeKey={activeKey} getBackup={getBackup} onRestore={handleRestore} />}
    </div>
    {sheet && <Sheet weeks={weeks} activeKey={activeKey} onSwitch={(k) => { activate(k); setSheet(false); }}
      onImport={handleImport} onClose={() => setSheet(false)} />}
    <nav style={{ flexShrink: 0, background: "#fff", borderTop: "1px solid #E3E0D6", display: "flex",
      paddingBottom: "max(env(safe-area-inset-bottom, 0px), 14px)", paddingTop: 8 }}>
      {tabs.map(({ id, label, Icon }) => {
        const on = tab === id;
        return <button key={id} onClick={() => setTab(id)} style={{ flex: 1, display: "flex", flexDirection: "column",
          alignItems: "center", gap: 3, background: "none", border: "none", cursor: "pointer", padding: "4px 0" }}>
          <Icon size={23} color={on ? T.ink : T.faint} strokeWidth={on ? 2.4 : 2} />
          <span style={{ fontSize: 11, fontWeight: on ? 800 : 600, color: on ? T.ink : T.faint }}>{label}</span>
        </button>; })}
    </nav>
  </div>;
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  window.__mounted = true;
} catch (e) {
  if (window.__err) window.__err((e && e.stack) || (e && e.message) || String(e));
}
</script>
</body>
</html>
